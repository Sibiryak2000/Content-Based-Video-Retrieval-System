dataset:
  videos_dir: "dataset"
  scenes_zip: "dataset/scenes_v3c1_204.zip"
  scenes_prefix: "scenes_v3c1_204"

output:
  root: "data/processed"
  proxies_dir: "data/processed/proxies"
  keyframes_dir: "data/processed/keyframes"
  db_path: "data/processed/metadata.db"
  inventory_report: "data/processed/inventory_report.json"
  embeddings_path: "data/processed/embeddings.npy"
  faiss_index: "data/processed/faiss.index"
  faiss_id_map: "data/processed/faiss_id_map.json"
  embedding_manifest: "data/processed/embedding_manifest.json"

embedding:
  batch_size: 32
  device: "cpu"

prototype:
  sample_video_ids:
    - "00001"
    - "00058"
    - "00122"
  proxy_height: 270
  keyframe_strategy: "mid_frame"

gui:
  page_size: 48

dres:
  base_url: "https://vbs.videobrowsing.org"
  username: ""       # fill in / use DRES_USERNAME env var
  password: ""        # fill in / use DRES_PASSWORD env var
  evaluation_id: "IVADL2026"
  evaluations:
    kis_textual: "b98560ad-91d5-4362-87b0-e852cedae937"   # IVADL 2026 Test - KIS Textual
    kis_visual: "16d4acd1-4d09-4c47-b1eb-39f7b376b6ac"    # IVADL 2026 Test - KIS Visual
    vqa: "521b57f1-cb8c-4aa5-a0f1-003be49fc98f"           # IVADL 2026 Test - VQA
  verify_ssl: true
  timeout_s: 10.0
